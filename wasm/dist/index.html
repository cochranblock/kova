<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kova — Augment Engine</title>
  <style>
    html, body { overflow: hidden; margin: 0; padding: 0; height: 100%; width: 100%; background: #0a0a0f; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="the_canvas_id"></canvas>
  <script type="module">
    import init, { WebHandle } from './kova_web.js';
    (async () => {
      await init();
      const handle = new WebHandle();
      await handle.start(document.getElementById("the_canvas_id"));
    })();
  </script>
</body>
</html>
