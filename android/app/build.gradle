apply plugin: 'com.android.application'

android {
    namespace 'org.cochranblock.kova'
    compileSdk 34

    defaultConfig {
        applicationId "org.cochranblock.kova"
        minSdk 28
        targetSdk 34
        versionCode 1
        versionName "0.4.0"
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            minifyEnabled false
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
}
