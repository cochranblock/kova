[package]
name = "kova"
version = "0.1.0"
edition = "2021"
description = "Kova — augment engine. Hybrid: native egui + web client, shared API."

[features]
default = ["gui", "serve", "inference"]
serve = ["dep:axum", "dep:futures-util", "dep:tower", "dep:tower-http", "dep:tracing", "dep:tracing-subscriber", "dep:similar"]
gui = ["dep:eframe", "dep:egui", "dep:similar"]
inference = ["dep:kalosm", "dep:kalosm-sample", "dep:reqwest", "dep:lru", "dep:once_cell"]
autopilot = ["dep:enigo"]
daemon = ["dep:capnp", "dep:capnpc"]  # Requires capnp compiler: brew install capnp
tests = ["exopack"]
# io_uring: stub for future kernel-bypass. No-op; design doc in SPEED.md.
io_uring = []

[dependencies]
kova-core = { path = "../kova-core" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
sled = "0.34"
bincode = { version = "2", features = ["serde"] }
zstd = "0.13"
toml = "0.8"
tokio = { workspace = true }
tempfile = { workspace = true }
similar = { version = "2", optional = true }

eframe = { version = "0.29", optional = true }
egui = { version = "0.29", optional = true }
axum = { version = "0.7", features = ["json", "macros", "ws"], optional = true }
futures-util = { version = "0.3", optional = true }
tower = { version = "0.4", features = ["util"], optional = true }
tower-http = { version = "0.6", features = ["cors"], optional = true }
tracing = { version = "0.1", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }
kalosm = { version = "0.4", features = ["language", "llama"], optional = true }
kalosm-sample = { version = "0.4", optional = true }
lru = { version = "0.12", optional = true }
once_cell = { version = "1.19", optional = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"], optional = true }
exopack = { path = "exopack", optional = true, features = ["triple_sims", "interface", "baked_demo", "demo", "video"] }
dirs = "5"
enigo = { version = "0.2", optional = true, default-features = false, features = ["x11rb"] }
capnp = { version = "0.25", optional = true }

[build-dependencies]
capnpc = { version = "0.25", optional = true }

[dev-dependencies]
tempfile = { workspace = true }
assert_matches = "1.5"

[lib]
name = "kova"
path = "src/lib.rs"

[[bin]]
name = "kova"
path = "src/main.rs"

[[bin]]
name = "kova-test"
path = "src/bin/kova-test.rs"
required-features = ["tests"]

